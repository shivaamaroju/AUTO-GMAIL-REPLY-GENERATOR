# BACKEND SERVICE (Updated to External)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: LoadBalancer # Change from ClusterIP to LoadBalancer
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: backend
---
# FRONTEND SERVICE (No changes needed)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend
